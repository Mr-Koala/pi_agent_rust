name: Linux Legacy Compatible Build

on:
  # 手动触发：用于你按需验证 fork 仓库能否稳定产出兼容老系统的二进制。
  workflow_dispatch:
    inputs:
      ref:
        description: "要构建的分支/Tag/提交（默认当前分支）"
        required: false
        default: ""

  # 可选自动触发：当 workflow 或构建配置改动时，自动跑一次快速验证。
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/linux-legacy-build.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"

permissions:
  contents: read

jobs:
  build-linux-compat:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          # 目标 1：glibc 2.17 基线，面向 CentOS 7.x 兼容。
          - target: x86_64-unknown-linux-gnu.2.17
            asset_name: pi-linux-amd64-glibc217
            archive_ext: tar.xz

          # 目标 2：musl 静态链接兜底包，最大化跨发行版可运行性。
          - target: x86_64-unknown-linux-musl
            asset_name: pi-linux-amd64-musl
            archive_ext: tar.xz

    env:
      CARGO_TERM_COLOR: always
      CI: "true"
      RUST_BACKTRACE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 支持手动传 ref，便于复现某次提交/Tag 的构建结果。
          ref: ${{ github.event.inputs.ref != '' && github.event.inputs.ref || github.ref }}

      - name: Ensure submodule fallback file exists
        shell: bash
        run: |
          set -euxo pipefail

          # 该文件被 include_str!() 引用；如果 fork 没带子模块内容，直接构建会失败。
          # 这里生成最小桩文件，保证 CI 可编译通过。
          MODELS_TS="legacy_pi_mono_code/pi-mono/packages/ai/src/models.generated.ts"
          if [ ! -f "$MODELS_TS" ]; then
            mkdir -p "$(dirname "$MODELS_TS")"
            cat > "$MODELS_TS" <<'STUB'
          // CI stub file: keep build green when submodule content is unavailable.
          export const MODELS = {} as const;
          STUB
          fi

      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        shell: bash
        run: |
          set -euxo pipefail
          cargo install cargo-zigbuild --locked

      - name: Build release binary with zig linker
        shell: bash
        run: |
          set -euxo pipefail

          # 使用 zig 进行链接控制：
          # - gnu.2.17 目标可显式约束 glibc 符号版本上限。
          # - musl 目标用于提供静态链接兜底包。
          cargo zigbuild \
            --release \
            --locked \
            --bin pi \
            --target "${{ matrix.target }}"

      - name: Verify glibc floor for gnu artifact
        if: matrix.target == 'x86_64-unknown-linux-gnu.2.17'
        shell: bash
        run: |
          set -euxo pipefail

          BIN_PATH="target/${{ matrix.target }}/release/pi"

          # 从导出符号中提取 GLIBC_* 版本，确保最高版本不超过 2.17。
          MAX_GLIBC="$(objdump -T "$BIN_PATH" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -V | tail -n1 || true)"

          if [ -z "$MAX_GLIBC" ]; then
            echo "未检测到 GLIBC 版本符号，继续（可能为静态或特殊链接场景）。"
            exit 0
          fi

          echo "Detected max glibc symbol: $MAX_GLIBC"
          if [ "$MAX_GLIBC" != "GLIBC_2.17" ]; then
            echo "检查版本序：若高于 2.17 则失败"
            HIGHEST="$(printf '%s\n' "$MAX_GLIBC" "GLIBC_2.17" | sort -V | tail -n1)"
            if [ "$HIGHEST" != "GLIBC_2.17" ]; then
              echo "::error::glibc symbol floor exceeded: $MAX_GLIBC > GLIBC_2.17"
              exit 1
            fi
          fi

      - name: Package artifact
        shell: bash
        run: |
          set -euxo pipefail

          VERSION="${GITHUB_SHA::7}"
          TARGET="${{ matrix.target }}"
          ASSET="${{ matrix.asset_name }}"

          mkdir -p dist
          STAGE_DIR="pi-${VERSION}-${TARGET}"
          mkdir -p "$STAGE_DIR"

          cp "target/${TARGET}/release/pi" "$STAGE_DIR/"
          cp LICENSE "$STAGE_DIR/" 2>/dev/null || true
          cp README.md "$STAGE_DIR/" 2>/dev/null || true

          tar -cJf "dist/${ASSET}.${{ matrix.archive_ext }}" "$STAGE_DIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/*
